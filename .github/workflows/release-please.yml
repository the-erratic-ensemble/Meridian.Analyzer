name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Create release PR or GitHub release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6

      - name: Setup .NET
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet restore Meridian.Analyzer.slnx

      - name: Test
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet test tests/Meridian.Analyzer.Tests/Meridian.Analyzer.Tests.csproj -c Release --no-restore

      - name: Pack
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet pack src/Meridian.Analyzer/Meridian.Analyzer.csproj -c Release --no-restore -o artifacts

      - name: Publish package
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
