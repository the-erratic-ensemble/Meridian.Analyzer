name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Create release PR or GitHub release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Setup .NET
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet restore Meridian.Analyzers.sln

      - name: Test
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet test tests/Meridian.Analyzers.Tests/Meridian.Analyzers.Tests.csproj -c Release --no-restore

      - name: Pack
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet pack Meridian.Analyzers.csproj -c Release --no-restore -o artifacts

      - name: Configure GitHub Packages source
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet nuget add source --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/the-erratic-ensemble/index.json"

      - name: Publish package
        if: ${{ steps.release.outputs.release_created }}
        run: dotnet nuget push "artifacts/*.nupkg" --source github --skip-duplicate
