name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Meridian.Analyzers.sln

      - name: Test
        run: dotnet test tests/Meridian.Analyzers.Tests/Meridian.Analyzers.Tests.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Meridian.Analyzers.csproj -c Release --no-restore -o artifacts
